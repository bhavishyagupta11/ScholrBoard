name: E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/scholrboard_e2e
      JWT_SECRET: ci_test_jwt_secret_key_32chars_min
      NODE_ENV: test
      CLIENT_ORIGIN: http://localhost:5173
      E2E_BASE_URL: http://localhost:5173
      E2E_API_URL: http://localhost:5000/api
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
            testing/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install testing dependencies
        run: npm ci
        working-directory: testing

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: testing

      - name: Build client
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Start API server
        run: npm start &
        working-directory: server

      - name: Start client preview
        run: npm run preview -- --port 5173 --host &
        working-directory: client

      - name: Wait for services
        run: |
          npx wait-on http://localhost:5000/api/health http://localhost:5173 --timeout 120000

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        working-directory: testing

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: testing/playwright-report/
          retention-days: 7
