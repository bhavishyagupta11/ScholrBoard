<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ScholrBoard — Premium campus management platform for verified achievements, AI-powered resume analysis, and placement-ready credentials." />
    <meta name="theme-color" content="#0b0f19" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ScholrBoard — Campus Management Platform" />
    <meta property="og:description" content="Premium campus management platform for verified achievements, AI-powered resume analysis, and placement-ready credentials." />
    <meta property="og:image" content="/assets/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="ScholrBoard — Campus Management Platform" />
    <meta property="twitter:description" content="Premium campus management platform for verified achievements, AI-powered resume analysis, and placement-ready credentials." />
    <meta property="twitter:image" content="/assets/logo.png" />
    
    <title>ScholrBoard — Campus Management Platform</title>
    <!-- Premium Typography: Plus Jakarta Sans + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = savedTheme || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
